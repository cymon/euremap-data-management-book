name: Deploy MYST Book to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MYST v1 + Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mystmd

      - name: Debug: List files in book/
        run: |
          ls -la book/

      - name: Build MYST book (with verbose output)
        run: |
          cd book
          python -m myst build . ../dist || echo "::error::MYST build failed. Full log above."

      - name: Setup Pages
        if: success()
        uses: actions/configure-pages@v4

      - name: Upload artifact
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        if: success()
        uses: actions/deploy-pages@v4
